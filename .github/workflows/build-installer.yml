name: Build Windows Installer

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows executable
        working-directory: apps/server
        run: pnpm build:exe

      - name: Download nssm
        shell: pwsh
        run: |
          $url = "https://nssm.cc/release/nssm-2.24.zip"
          Invoke-WebRequest -Uri $url -OutFile nssm.zip
          Expand-Archive nssm.zip -DestinationPath nssm-tmp
          Copy-Item nssm-tmp\nssm-2.24\win64\nssm.exe installer\assets\nssm.exe

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Compile installer
        working-directory: installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" vynex-setup.nsi

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: vynex-server-setup
          path: installer/vynex-server-setup.exe
          retention-days: 30

      - name: Create release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/vynex-server-setup.exe
